<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="container">
            <div class="info">
                <div class="info-highScore">
                    <section>
                        <h4>High Score: </h4>
                        <h4 class="high-score">0</h4>
                    </section>
                </div>
                <div class="info-score">
                      <section>
                        <h4>Score: </h4>
                        <h4 class="score">0</h4>
                    </section>
                </div>
                <div class="info-Time">
                    <section>
                        <h4>Time: </h4>
                        <h4 class="session-time">00:00</h4>
                    </section>
                </div>
            </div>
            <div class="board">
             
            </div>
       
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>welocme to snake game </h3>
                <button class="btn btn-newgame">New Game </button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
